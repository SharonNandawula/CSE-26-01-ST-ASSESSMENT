{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Onlanding Page</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

    <style>
        body {
            background-color: #ed7d31;
        }

        .btn-join {
            padding: 14px 80px;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            border-radius: 4px;
            color: #ed7d31;
        }

        .btn-join:hover {
            background-color: #ffffff;
            color: #ed7d31;
        }
    </style>
</head>
<body>
    <div class="vh-100 d-flex flex-column justify-content-center align-items-center gap-5">

        <img src="{% static 'image/logo_white.png' %}" alt="Best Shoppers Market" width="250">

        <a href="{% url 'dashboard' %}" class="btn btn-light btn-join">JOIN NOW</a>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
